version: 2.1
setup: true
orbs:
  orb-tools: circleci/orb-tools@12.4.0
  shellcheck: circleci/shellcheck@3.4.0

filters: &filters
  tags:
    only: /.*/

workflows:
  lint-pack:
    jobs:
      - orb-tools/lint:
          filters: *filters
      - orb-tools/pack:
          filters: *filters
      - orb-tools/review:
          filters: *filters
          exclude: RC010
      - shellcheck/check:
          filters: *filters
          exclude: SC2148,SC2038,SC2086,SC2002,SC2016
      # Fork PRs (branch name matches pull/<number>) require manual approval
      # before the downstream test-deploy pipeline runs. CircleCI treats
      # filtered-out jobs as auto-passing in requires, so on maintainer
      # branches approve-contributor-pr never schedules and orb-tools/continue
      # fires immediately — no impact on the existing maintainer workflow.
      - approve-contributor-pr:
          type: approval
          filters:
            branches:
              ignore: /^pull\/[0-9]+/
      - orb-tools/continue:
          orb_name: cypress
          pipeline_number: << pipeline.number >>
          vcs_type: << pipeline.project.type >>
          requires:
            - orb-tools/lint
          filters:
            branches:
              only: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
