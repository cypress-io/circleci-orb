# Use the node_modules linker so the Cypress binary resolves the same way it
# does under classic Yarn / npm. Cypress recommends this over Yarn Berry's
# default Plug'n'Play linker, which it is not compatible with. See:
# https://docs.cypress.io/app/get-started/install-cypress
nodeLinker: node-modules

# Block dependency lifecycle scripts (e.g. Cypress's `postinstall` binary
# download) on install. This mirrors Yarn Berry's hardened default and ensures
# the orb's explicit `cypress install` step is what downloads the binary.
enableScripts: false
